<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="BBB 5/3/1"/>
  <meta name="theme-color" content="#111214"/>
  <title>BBB 5/3/1 Tracker</title>
  <script>
    const manifest = {
      name: "Boring But Big 5/3/1", short_name: "BBB 5/3/1",
      start_url: ".", display: "standalone",
      background_color: "#111214", theme_color: "#111214",
      icons: [{
        src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23111214'/><text y='62' x='50' text-anchor='middle' font-size='42' font-family='monospace' font-weight='bold' fill='%23f5a623'>531</text></svg>`),
        sizes: "192x192", type: "image/svg+xml"
      }]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    const link = document.createElement('link'); link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#111214;--surface:#1a1c1f;--surface2:#22252a;--border:#2e3138;
      --amber:#f5a623;--amber-dim:#3d2a0a;--amber-mid:#7a5210;
      --text:#e8e9eb;--muted:#6b7280;--green:#4ade80;--red:#f87171;--blue:#60a5fa;
      --font-head:'Space Grotesk',sans-serif;--font-mono:'Space Mono',monospace;
      --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
    }
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--text);font-family:var(--font-head);display:flex;flex-direction:column;padding-top:var(--safe-top)}
    #app{display:flex;flex-direction:column;height:100%}

    /* Header */
    .header{padding:14px 20px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
    .logo{font-size:10px;font-family:var(--font-mono);color:var(--amber);letter-spacing:3px}
    .title{font-size:19px;font-weight:700;letter-spacing:-.4px}
    .cycle-badge{font-family:var(--font-mono);font-size:11px;background:var(--amber-dim);color:var(--amber);padding:3px 9px;border-radius:4px}

    /* Wave Row */
    .wave-row{display:flex;align-items:center;gap:16px;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
    .wave-ring{position:relative;width:70px;height:70px;flex-shrink:0}
    .wave-ring svg{transform:rotate(-90deg)}
    .wave-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .wave-num{font-family:var(--font-mono);font-size:20px;font-weight:700;color:var(--amber);line-height:1}
    .wave-lbl{font-size:8px;color:var(--muted);letter-spacing:1.5px;margin-top:2px}
    .wave-info-title{font-size:14px;font-weight:700;margin-bottom:3px}
    .wave-info-sub{font-size:12px;color:var(--muted)}

    /* Navigation */
    .nav{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
    .nav-tab{flex:1;min-width:64px;padding:14px 4px;font-size:11px;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;text-align:center;font-family:var(--font-head);transition:color .12s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
    .nav-tab.active{color:var(--amber);border-bottom-color:var(--amber)}

    /* Content Area */
    .content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(24px + var(--safe-bot))}
    .section{padding:16px 20px}
    .sec-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;font-family:var(--font-mono);display:block}

    /* Selection Grids */
    .lift-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
    .lift-btn{padding:12px 4px;font-size:12px;font-family:var(--font-mono);font-weight:700;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;transition:all .12s;letter-spacing:1px;-webkit-tap-highlight-color:transparent}
    .lift-btn.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}

    /* Option Toggles */
    .toggle-row{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:12px;gap:2px}
    .toggle-opt{flex:1;padding:8px;font-size:11px;font-weight:600;color:var(--muted);background:none;border:none;border-radius:6px;cursor:pointer;font-family:var(--font-head);-webkit-tap-highlight-color:transparent}
    .toggle-opt.active{background:var(--surface);color:var(--amber);border:1px solid var(--border)}

    /* Table */
    .set-table{width:100%;border-collapse:collapse;margin-bottom:18px}
    .set-table th{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-family:var(--font-mono);text-align:left;padding:0 10px 8px;font-weight:400}
    .set-table td{padding:10px;font-family:var(--font-mono);font-size:14px}
    .set-row td{background:var(--surface);border-top:1px solid var(--border)}
    .set-row:first-of-type td:first-child{border-radius:8px 0 0 0}
    .set-row:first-of-type td:last-child{border-radius:0 8px 0 0}
    .set-row:last-of-type td:first-child{border-radius:0 0 0 8px}
    .set-row:last-of-type td:last-child{border-radius:0 0 8px 0}
    .w-big{font-size:17px;font-weight:700}
    .w-unit{font-size:11px;color:var(--muted);margin-left:2px}
    .rep-pill{display:inline-block;background:var(--amber-dim);color:var(--amber);padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700}
    .muted{color:var(--muted)}

    /* Blocks */
    .bbb-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px}
    .bbb-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:8px}
    .bbb-title{font-size:13px;font-weight:700}
    .bbb-sub{font-size:11px;color:var(--muted);margin-top:2px}
    .bbb-pcts{display:flex;gap:5px;flex-shrink:0}
    .pct-btn{font-size:11px;font-family:var(--font-mono);padding:6px 10px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .12s;-webkit-tap-highlight-color:transparent}
    .pct-btn.active{border-color:var(--amber);color:var(--amber);background:var(--amber-dim)}
    .bbb-sets-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
    .bbb-chip{flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:var(--font-mono);font-size:13px}
    .bbb-chip-lbl{font-size:9px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:2px}

    /* Accessories */
    .acc-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px}
    .acc-title{font-size:12px;font-weight:700;margin-bottom:10px;color:var(--text)}
    .acc-options{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
    .acc-opt{font-size:11px;font-family:var(--font-mono);padding:8px 12px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .12s;-webkit-tap-highlight-color:transparent}
    .acc-opt.active{border-color:var(--blue);color:var(--blue);background:#1e2a3a}
    .acc-scheme{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .scheme-lbl{font-size:11px;color:var(--muted);margin-right:4px}
    .scheme-btn{font-size:11px;font-family:var(--font-mono);padding:6px 12px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent}
    .scheme-btn.active{border-color:var(--blue);color:var(--blue);background:#1e2a3a}
    .acc-weight-row{display:flex;align-items:center;gap:8px;margin-top:10px}
    .acc-weight-lbl{font-size:11px;color:var(--muted)}
    .acc-weight-input{font-family:var(--font-mono);font-size:14px;font-weight:700;width:80px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--blue);padding:6px 10px;text-align:right}
    .acc-weight-input:focus{outline:none;border-color:var(--blue)}

    /* Primary CTA */
    .log-btn{width:100%;padding:15px;background:var(--amber);color:#111;font-family:var(--font-head);font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;letter-spacing:.2px;transition:opacity .15s;-webkit-tap-highlight-color:transparent;margin-top:4px}
    .log-btn:active{opacity:.8}
    .log-btn.done{background:var(--surface2);color:var(--green);border:1px solid var(--green)}
    .log-btn:disabled{opacity:.45}

    /* Calisthenics */
    .cali-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
    .cali-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .cali-name{font-size:15px;font-weight:700}
    .cali-goal-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .cali-goal-lbl{font-size:11px;color:var(--muted);width:80px}
    .cali-goal-input{font-family:var(--font-mono);font-size:14px;font-weight:700;width:60px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--green);padding:5px 8px;text-align:right}
    .cali-goal-input:focus{outline:none;border-color:var(--green)}
    .prog-bar-wrap{flex:1}
    .prog-bar-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:3px}
    .prog-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s ease}
    .prog-bar-sub{font-size:10px;color:var(--muted);font-family:var(--font-mono)}
    .cali-log-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
    .cali-set-input-wrap{display:flex;flex-direction:column;gap:4px}
    .cali-set-lbl{font-size:9px;color:var(--muted);letter-spacing:1px;font-family:var(--font-mono)}
    .cali-set-input{font-family:var(--font-mono);font-size:14px;font-weight:700;width:52px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 6px;text-align:center}
    .cali-set-input:focus{outline:none;border-color:var(--amber)}
    .add-set-btn{font-size:11px;font-family:var(--font-mono);padding:8px 12px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;align-self:flex-end;-webkit-tap-highlight-color:transparent}
    .cali-log-btn{padding:10px 16px;background:var(--green);color:#111;font-family:var(--font-head);font-size:13px;font-weight:700;border:none;border-radius:8px;cursor:pointer;align-self:flex-end;-webkit-tap-highlight-color:transparent}
    .cali-weight-row{display:flex;align-items:center;gap:8px;margin-top:8px;margin-bottom:8px}
    .cali-weight-lbl{font-size:11px;color:var(--muted)}
    .cali-hist{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
    .cali-hist-title{font-size:10px;color:var(--muted);letter-spacing:1.5px;font-family:var(--font-mono);margin-bottom:8px}
    .cali-hist-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
    .cali-hist-date{font-size:10px;color:var(--muted);font-family:var(--font-mono);width:70px;flex-shrink:0}
    .cali-hist-bar-track{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
    .cali-hist-bar-fill{height:100%;background:var(--green);border-radius:2px}
    .cali-hist-val{font-size:11px;font-family:var(--font-mono);color:var(--text);width:36px;text-align:right}
    .trend-badge{font-size:10px;font-family:var(--font-mono);padding:2px 6px;border-radius:4px}
    .trend-up{background:#14281a;color:var(--green)}
    .trend-down{background:#2a1414;color:var(--red)}
    .trend-flat{background:var(--surface2);color:var(--muted)}

    /* Logs */
    .log-empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;line-height:1.6}
    .log-entry{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px}
    .log-entry-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .log-lift-name{font-size:15px;font-weight:700}
    .log-right{display:flex;align-items:center;gap:10px}
    .log-date{font-size:11px;color:var(--muted);font-family:var(--font-mono)}
    .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:4px 8px;-webkit-tap-highlight-color:transparent}
    .del-btn:active{color:var(--red)}
    .log-tags{display:flex;gap:6px;flex-wrap:wrap}
    .tag{font-size:11px;font-family:var(--font-mono);background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:3px 8px;border-radius:4px}
    .tag.hi{border-color:var(--amber-mid);color:var(--amber)}
    .tag.bl{border-color:#1e3a5f;color:var(--blue)}
    .tag.gr{border-color:#14281a;color:var(--green)}

    /* Settings Layout */
    .settings-list{display:flex;flex-direction:column;gap:10px}
    .setting-card{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;gap:12px}
    .setting-name{font-size:14px;font-weight:600}
    .setting-hint{font-size:11px;color:var(--muted);margin-top:3px}
    .tm-input{font-family:var(--font-mono);font-size:18px;font-weight:700;width:82px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--amber);padding:6px 10px;text-align:right}
    .tm-input:focus{outline:none;border-color:var(--amber)}
    .stepper{display:flex;align-items:center;gap:10px}
    .stepper-val{font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--amber);min-width:36px;text-align:center}
    .step-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:border-color .12s;-webkit-tap-highlight-color:transparent}
    .step-btn:active{border-color:var(--amber);color:var(--amber)}
    .unit-row{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden}
    .unit-opt{flex:1;padding:8px 12px;font-size:12px;font-family:var(--font-mono);background:none;border:none;color:var(--muted);cursor:pointer;text-align:center}
    .unit-opt.active{background:var(--amber-dim);color:var(--amber)}

    /* Progress summary */
    .prog-lift{margin-bottom:22px}
    .prog-lift-head{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;margin-bottom:10px}
    .tm-pill{font-family:var(--font-mono);font-size:11px;background:var(--amber-dim);color:var(--amber);padding:2px 8px;border-radius:20px}
    .sessions-pill{font-size:11px;color:var(--muted);margin-left:auto}
    .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
    .bar-lbl{font-size:10px;font-family:var(--font-mono);color:var(--muted);width:46px;text-align:right}
    .bar-track{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
    .bar-fill{height:100%;background:var(--amber);border-radius:3px;transition:width .4s ease}
    .bar-val{font-family:var(--font-mono);font-size:11px;color:var(--text);width:40px}

    /* System notifications */
    .toast{position:fixed;bottom:calc(80px + var(--safe-bot));left:50%;transform:translateX(-50%);background:var(--green);color:#111;font-weight:700;font-size:13px;padding:10px 20px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;z-index:999}
    .toast.show{opacity:1}
    .divider{height:1px;background:var(--border);margin:4px 0 14px}
    .spacer{height:16px}
    .widget-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px}
    .widget-title{font-size:13px;font-weight:700;margin-bottom:6px}
    .widget-sub{font-size:12px;color:var(--muted);line-height:1.6}
    .widget-btn{width:100%;padding:12px;background:#1e2a3a;color:var(--blue);font-family:var(--font-head);font-size:14px;font-weight:700;border:1px solid var(--blue);border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;margin-top:8px}
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ─── Data & Helpers ─────────────────────────────────────────────────────────
const LIFTS = ['Squat', 'Bench', 'Deadlift', 'OHP'];
const ABBR  = {Squat: 'SQ', Bench: 'BP', Deadlift: 'DL', OHP: 'OHP'};

const OPPOSITE_LIFTS = {
  Squat: 'Deadlift',
  Bench: 'OHP',
  Deadlift: 'Squat',
  OHP: 'Bench'
};

const ACCESSORIES = {
  Squat: {
    A: ['Leg Press', 'Lunges', 'Hack Squat', 'Bulgarian Split Squat'],
    B: ['Calf Raises', 'Leg Curl', 'RDL', 'Good Mornings']
  },
  Bench: {
    A: ['DB Flies', 'Cable Flies', 'Dips', 'Incline DB Press'],
    B: ['Tricep Pushdowns', 'Skull Crushers', 'Close-Grip Bench', 'Overhead Tricep Ext']
  },
  Deadlift: {
    A: ['RDL', 'Good Mornings', 'Back Extensions', 'Deficit Deadlift'],
    B: ['Leg Curl', 'Leg Press', 'Glute Bridge', 'Hip Thrust']
  },
  OHP: {
    A: ['DB Lateral Raises', 'Arnold Press', 'Face Pulls', 'Cable Lateral Raises'],
    B: ['Tricep Pushdowns', 'Dips', 'Skull Crushers', 'Overhead Tricep Ext']
  }
};

const CALI_MOVES = ['Pullups', 'Dips', 'Pushups', 'Leg Raises'];

const WEEKS = [
  {label: 'Week 1 — 5s', short: '5s Week', sets: [{p: .65, r: 5}, {p: .75, r: 5}, {p: .85, r: '5+'}]},
  {label: 'Week 2 — 3s', short: '3s Week', sets: [{p: .70, r: 3}, {p: .80, r: 3}, {p: .90, r: '3+'}]},
  {label: 'Week 3 — 1s', short: '1s Week', sets: [{p: .75, r: 5}, {p: .85, r: 3}, {p: .95, r: '1+'}]},
  {label: 'Week 4 — Deload', short: 'Deload', sets: [{p: .40, r: 5}, {p: .50, r: 5}, {p: .60, r: 5}]},
];

const BBB_OPTS = [{label: '50%', pct: .50}, {label: '60%', pct: .60}, {label: '70%', pct: .70}];
const r5 = n => Math.round(n / 5) * 5;

// ─── Storage Interface ────────────────────────────────────────────────────────
const ls = {
  get: (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d } catch { return d } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)) } catch {} }
};

// ─── Application State ────────────────────────────────────────────────────────
let S = {
  tab: 'workout',
  weekIdx: ls.get('bbb_week', 0),
  cycle:   ls.get('bbb_cycle', 1),
  tm:      ls.get('bbb_tm', {Squat: 225, Bench: 185, Deadlift: 275, OHP: 135}),
  unit:    ls.get('bbb_unit', 'lbs'),
  log:     ls.get('bbb_log', []),
  caliLog: ls.get('bbb_cali', []),
  caliGoals: ls.get('bbb_cali_goals', {Pullups: 10, Dips: 15, Pushups: 30, 'Leg Raises': 20}),
  bbbVariant: ls.get('bbb_variant', 'same'), // 'same' or 'opposite'
  // Ephemeral State
  lift: 'Squat',
  bbbPct: .60,
  accA: {Squat: null, Bench: null, Deadlift: null, OHP: null},
  accB: {Squat: null, Bench: null, Deadlift: null, OHP: null},
  accAScheme: {Squat: '5x10', Bench: '5x10', Deadlift: '5x10', OHP: '5x10'},
  accBScheme: {Squat: '5x10', Bench: '5x10', Deadlift: '5x10', OHP: '5x10'},
  accAWeight: {Squat: '', Bench: '', Deadlift: '', OHP: ''},
  accBWeight: {Squat: '', Bench: '', Deadlift: '', OHP: ''},
  caliSets: {Pullups: [''], Dips: [''], Pushups: [''], 'Leg Raises': ['']},
  caliWeight: {Pullups: '', Dips: '', Pushups: '', 'Leg Raises': ''},
};

const today = () => new Date().toISOString().split('T')[0];
const fmtDate = d => new Date(d + 'T12:00:00').toLocaleDateString('en-US', {month: 'short', day: 'numeric'});
const fmtDateLong = d => new Date(d + 'T12:00:00').toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t) }
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Scriptable Interoperability ─────────────────────────────────────────────
function syncToWidget() {
  const week = WEEKS[S.weekIdx];
  const nextLift = S.lift;
  const tm = S.tm[nextLift];
  const topSet = week.sets[2];
  
  let bbbLift = S.lift;
  if (S.bbbVariant === 'opposite') {
    bbbLift = OPPOSITE_LIFTS[S.lift];
  }
  const bbbTm = S.tm[bbbLift];

  const payload = {
    cycle: S.cycle,
    week: S.weekIdx + 1,
    weekLabel: week.short,
    lift: nextLift,
    topWeight: r5(topSet.p * tm),
    topReps: topSet.r,
    bbbLift: bbbLift,
    bbbWeight: r5(S.bbbPct * bbbTm),
    unit: S.unit,
    lastSync: new Date().toISOString()
  };
  const encoded = encodeURIComponent(JSON.stringify(payload));
  const url = `scriptable:///run?scriptName=BBB531Widget&data=${encoded}`;
  try { window.location.href = url; } catch(e) {}
}

// ─── DOM Building Helpers ────────────────────────────────────────────────────
const el = (tag, cls = '') => { const e = document.createElement(tag || 'div'); if (cls) e.className = cls; return e; };
const span = (cls, txt = '') => { const s = document.createElement('span'); if (cls) s.className = cls; s.textContent = txt; return s; };
const div = (cls = '') => el('div', cls);

// ─── UI Router / Layout Engine ────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const hdr = div('header');
  const ht = div('header-top');
  ht.appendChild(span('logo', '5/3/1 BBB'));
  ht.appendChild(span('cycle-badge', `Cycle ${S.cycle}`));
  hdr.appendChild(ht);
  hdr.appendChild(span('title', 'Boring But Big'));
  app.appendChild(hdr);

  app.appendChild(renderWave());
  app.appendChild(renderNav());

  const content = div('content');
  if      (S.tab === 'workout')  content.appendChild(renderWorkout());
  else if (S.tab === 'cali')     content.appendChild(renderCali());
  else if (S.tab === 'log')      content.appendChild(renderLog());
  else if (S.tab === 'progress') content.appendChild(renderProgress());
  else if (S.tab === 'settings') content.appendChild(renderSettings());
  app.appendChild(content);
}

function renderWave() {
  const wi = S.weekIdx, week = WEEKS[wi];
  const r = 30, circ = 2 * Math.PI * r, fill = circ * ((wi + 1) / 4);
  const row = div('wave-row');
  const ring = div('wave-ring');
  ring.innerHTML = `<svg width="70" height="70" viewBox="0 0 70 70">
    <circle cx="35" cy="35" r="${r}" fill="none" stroke="#2e3138" stroke-width="6"/>
    <circle cx="35" cy="35" r="${r}" fill="none" stroke="#f5a623" stroke-width="6"
      stroke-dasharray="${fill} ${circ}" stroke-linecap="round"/>
  </svg>
  <div class="wave-center">
    <div class="wave-num">W${wi + 1}</div>
    <div class="wave-lbl">OF 4</div>
  </div>`;
  row.appendChild(ring);
  const info = div();
  info.appendChild(span('wave-info-title', week.label));
  info.appendChild(span('wave-info-sub', wi < 3
    ? `Top set: ${Math.round(week.sets[2].p * 100)}% × ${week.sets[2].r}`
    : 'Active recovery week'));
  row.appendChild(info);
  return row;
}

function renderNav() {
  const nav = div('nav');
  [['workout', 'Workout'], ['cali', 'Calisthenics'], ['log', 'Log'], ['progress', 'Progress'], ['settings', 'Settings']].forEach(([id, lbl]) => {
    const b = el('button', 'nav-tab' + (S.tab === id ? ' active' : ''));
    b.textContent = lbl; b.onclick = () => { S.tab = id; render() };
    nav.appendChild(b);
  });
  return nav;
}

// ─── Workout Tab ─────────────────────────────────────────────────────────────
function renderWorkout() {
  const sec = div('section');
  const wi = S.weekIdx, week = WEEKS[wi], tm = S.tm[S.lift], u = S.unit;

  // Lift selection
  sec.appendChild(span('sec-label', 'Select Main Lift'));
  const grid = div('lift-grid');
  LIFTS.forEach(l => {
    const b = el('button', 'lift-btn' + (S.lift === l ? ' active' : ''));
    b.textContent = ABBR[l]; b.onclick = () => { S.lift = l; render() };
    grid.appendChild(b);
  });
  sec.appendChild(grid);

  // Main 5/3/1 calculation
  sec.appendChild(span('sec-label', `Main Work — ${S.lift} (TM: ${tm} ${u})`));
  const tbl = document.createElement('table'); tbl.className = 'set-table';
  tbl.innerHTML = `<thead><tr><th>Set</th><th>%</th><th>Weight</th><th>Reps</th></tr></thead>`;
  const tbody = document.createElement('tbody');
  week.sets.forEach((s, i) => {
    const w = r5(s.p * tm), tr = document.createElement('tr'); tr.className = 'set-row';
    tr.innerHTML = `<td class="muted">${i + 1}</td><td class="muted">${Math.round(s.p * 100)}%</td>
      <td><span class="w-big">${w}</span><span class="w-unit">${u}</span></td>
      <td><span class="rep-pill">${s.r}</span></td>`;
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody); sec.appendChild(tbl);

  // Boring But Big sets (5x10)
  if (wi < 3) {
    sec.appendChild(span('sec-label', 'BBB Setup'));
    
    // Lift Variation Selector (Same vs Opposite)
    const bbbLiftToggle = div('toggle-row');
    const optSame = el('button', 'toggle-opt' + (S.bbbVariant === 'same' ? ' active' : ''));
    optSame.textContent = `Same Lift (${ABBR[S.lift]})`;
    optSame.onclick = () => { S.bbbVariant = 'same'; ls.set('bbb_variant', 'same'); render() };
    
    const oppLiftName = OPPOSITE_LIFTS[S.lift];
    const optOpp = el('button', 'toggle-opt' + (S.bbbVariant === 'opposite' ? ' active' : ''));
    optOpp.textContent = `Opposite (${ABBR[oppLiftName]})`;
    optOpp.onclick = () => { S.bbbVariant = 'opposite'; ls.set('bbb_variant', 'opposite'); render() };
    
    bbbLiftToggle.appendChild(optSame);
    bbbLiftToggle.appendChild(optOpp);
    sec.appendChild(bbbLiftToggle);

    let bbbLift = S.lift;
    if (S.bbbVariant === 'opposite') {
      bbbLift = OPPOSITE_LIFTS[S.lift];
    }
    const bbbTm = S.tm[bbbLift];
    const bbbWeight = r5(S.bbbPct * bbbTm);

    const bbb = div('bbb-block');
    const bh = div('bbb-header');
    const bl = div();
    bl.appendChild(span('bbb-title', `${bbbLift} — 5 sets × 10 reps`));
    bl.appendChild(span('bbb-sub', `${bbbWeight} ${u} per set (using ${bbbLift} TM)`));
    bh.appendChild(bl);
    
    const pcts = div('bbb-pcts');
    BBB_OPTS.forEach(o => {
      const b = el('button', 'pct-btn' + (S.bbbPct === o.pct ? ' active' : ''));
      b.textContent = o.label; b.onclick = () => { S.bbbPct = o.pct; render() };
      pcts.appendChild(b);
    });
    bh.appendChild(pcts); bbb.appendChild(bh);

    const chips = div('bbb-sets-row');
    for (let n = 1; n <= 5; n++) {
      const c = div('bbb-chip');
      c.innerHTML = `<span class="bbb-chip-lbl">SET ${n}</span>${bbbWeight} <span style="font-size:10px;color:var(--muted)">${u} × 10</span>`;
      chips.appendChild(c);
    }
    bbb.appendChild(chips); sec.appendChild(bbb);

    // Accessories
    sec.appendChild(span('sec-label', 'Accessory Movements'));
    ['A', 'B'].forEach(slot => {
      const opts = ACCESSORIES[S.lift][slot];
      const selKey = slot === 'A' ? 'accA' : 'accB';
      const schemeKey = slot === 'A' ? 'accAScheme' : 'accBScheme';
      const weightKey = slot === 'A' ? 'accAWeight' : 'accBWeight';
      const selected = S[selKey][S.lift];
      const scheme = S[schemeKey][S.lift];
      const weight = S[weightKey][S.lift];

      const acc = div('acc-block');
      acc.appendChild(span('acc-title', `Accessory ${slot}`));

      const optsRow = div('acc-options');
      opts.forEach(o => {
        const b = el('button', 'acc-opt' + (selected === o ? ' active' : ''));
        b.textContent = o;
        b.onclick = () => { S[selKey][S.lift] = (selected === o ? null : o); render() };
        optsRow.appendChild(b);
      });
      acc.appendChild(optsRow);

      if (selected) {
        const sr = div('acc-scheme');
        sr.appendChild(span('scheme-lbl', 'Scheme:'));
        ['5x10', '5x15'].forEach(sc => {
          const b = el('button', 'scheme-btn' + (scheme === sc ? ' active' : ''));
          b.textContent = sc;
          b.onclick = () => { S[schemeKey][S.lift] = sc; render() };
          sr.appendChild(b);
        });
        acc.appendChild(sr);

        const wr = div('acc-weight-row');
        wr.appendChild(span('acc-weight-lbl', 'Weight:'));
        const wi2 = el('input'); wi2.type = 'number'; wi2.step = 5; wi2.className = 'acc-weight-input';
        wi2.placeholder = 'lbs'; wi2.value = weight;
        wi2.oninput = () => { S[weightKey][S.lift] = wi2.value };
        wr.appendChild(wi2);
        wr.appendChild(span('acc-weight-lbl', u));
        acc.appendChild(wr);
      }
      sec.appendChild(acc);
    });
  }

  // Submission control
  const tdStr = today();
  const alreadyLogged = S.log.some(e => e.lift === S.lift && e.date === tdStr && e.cycle === S.cycle && e.weekIdx === wi);
  const lb = el('button', 'log-btn' + (alreadyLogged ? ' done' : ''));
  lb.textContent = alreadyLogged ? '✓ Workout Logged Today' : `Log ${S.lift} Workout`;
  lb.disabled = alreadyLogged;
  lb.onclick = () => {
    let bbbLift = S.lift;
    if (S.bbbVariant === 'opposite') {
      bbbLift = OPPOSITE_LIFTS[S.lift];
    }
    const bbbTm = S.tm[bbbLift];

    const accA = S.accA[S.lift], accB = S.accB[S.lift];
    const entry = {
      id: Date.now(), lift: S.lift, date: tdStr,
      cycle: S.cycle, weekIdx: wi, weekLabel: week.label,
      topWeight: r5(week.sets[2].p * tm), topReps: week.sets[2].r,
      bbbLift: wi < 3 ? bbbLift : null,
      bbbWeight: wi < 3 ? r5(S.bbbPct * bbbTm) : null, bbbPct: S.bbbPct,
      unit: S.unit,
      accA: accA ? {name: accA, scheme: S.accAScheme[S.lift], weight: S.accAWeight[S.lift]} : null,
      accB: accB ? {name: accB, scheme: S.accBScheme[S.lift], weight: S.accBWeight[S.lift]} : null,
    };
    S.log = [entry, ...S.log];
    ls.set('bbb_log', S.log);
    showToast('Workout logged');
    setTimeout(syncToWidget, 800);
    render();
  };
  sec.appendChild(lb);
  return sec;
}

// ─── Calisthenics Tab ────────────────────────────────────────────────────────
function renderCali() {
  const sec = div('section');
  sec.appendChild(span('sec-label', 'Calisthenics Tracker'));

  CALI_MOVES.forEach(move => {
    const history = S.caliLog.filter(e => e.move === move).slice(0, 8);
    const maxVol = history.reduce((mx, e) => Math.max(mx, e.totalReps), 0) || 1;
    const goal = S.caliGoals[move] || 20;
    const lastBest = history.length ? history[0].bestSet : 0;
    const pct = Math.min(100, Math.round((lastBest / goal) * 100));

    let trend = 'flat', trendTxt = '—';
    if (history.length >= 2) {
      const diff = history[0].totalReps - history[1].totalReps;
      if (diff > 0) { trend = 'up'; trendTxt = `+${diff}` }
      else if (diff < 0) { trend = 'down'; trendTxt = `${diff}` }
      else trendTxt = '0';
    }

    const card = div('cali-card');

    const head = div('cali-head');
    head.appendChild(span('cali-name', move));
    const tb = el('span', `trend-badge trend-${trend}`); tb.textContent = trendTxt; head.appendChild(tb);
    card.appendChild(head);

    const gr = div('cali-goal-row');
    gr.appendChild(span('cali-goal-lbl', 'Goal (best set):'));
    const ginp = el('input'); ginp.type = 'number'; ginp.className = 'cali-goal-input';
    ginp.value = goal;
    ginp.oninput = () => { S.caliGoals[move] = parseInt(ginp.value) || goal; ls.set('bbb_cali_goals', S.caliGoals) };
    gr.appendChild(ginp);
    
    const pbwrap = div('prog-bar-wrap');
    const pbt = div('prog-bar-track');
    const pbf = div('prog-bar-fill'); pbf.style.width = pct + '%';
    pbt.appendChild(pbf); pbwrap.appendChild(pbt);
    pbwrap.appendChild(span('prog-bar-sub', `Best: ${lastBest} / ${goal} reps (${pct}%)`));
    gr.appendChild(pbwrap);
    card.appendChild(gr);

    // Active sets entry
    const sets = S.caliSets[move];
    const logRow = div('cali-log-row');
    sets.forEach((v, i) => {
      const wrap = div('cali-set-input-wrap');
      wrap.appendChild(span('cali-set-lbl', `SET ${i + 1}`));
      const inp = el('input'); inp.type = 'number'; inp.className = 'cali-set-input';
      inp.value = v; inp.placeholder = '0';
      inp.oninput = () => { S.caliSets[move][i] = inp.value };
      wrap.appendChild(inp); logRow.appendChild(wrap);
    });

    if (sets.length < 8) {
      const addBtn = el('button', 'add-set-btn');
      addBtn.textContent = '+Set';
      addBtn.onclick = () => { S.caliSets[move].push(''); render() };
      logRow.appendChild(addBtn);
    }

    const cwr = div('cali-weight-row');
    cwr.appendChild(span('cali-weight-lbl', 'Added weight:'));
    const cwi = el('input'); cwi.type = 'number'; cwi.step = 5; cwi.className = 'acc-weight-input';
    cwi.placeholder = '0'; cwi.value = S.caliWeight[move];
    cwi.oninput = () => { S.caliWeight[move] = cwi.value };
    cwr.appendChild(cwi);
    cwr.appendChild(span('cali-weight-lbl', S.unit + ' (optional)'));
    card.appendChild(cwr);

    const lb = el('button', 'cali-log-btn');
    lb.textContent = `Log ${move}`;
    lb.onclick = () => {
      const repArr = S.caliSets[move].map(v => parseInt(v) || 0).filter(v => v > 0);
      if (!repArr.length) { showToast('Enter at least one set'); return; }
      const totalReps = repArr.reduce((a, b) => a + b, 0);
      const bestSet = Math.max(...repArr);
      const entry = {
        id: Date.now(), move, date: today(),
        sets: repArr, totalReps, bestSet,
        addedWeight: S.caliWeight[move] || 0, unit: S.unit
      };
      S.caliLog = [entry, ...S.caliLog];
      ls.set('bbb_cali', S.caliLog);
      S.caliSets[move] = [''];
      S.caliWeight[move] = '';
      showToast(`${move} logged`);
      render();
    };
    logRow.appendChild(lb);
    card.appendChild(logRow);

    if (history.length) {
      const hist = div('cali-hist');
      hist.appendChild(span('cali-hist-title', 'Recent Sessions (total reps)'));
      history.slice(0, 6).reverse().forEach(e => {
        const row = div('cali-hist-row');
        row.appendChild(span('cali-hist-date', fmtDate(e.date)));
        const bt = div('cali-hist-bar-track');
        const bf = div('cali-hist-bar-fill');
        bf.style.width = `${Math.round((e.totalReps / maxVol) * 100)}%`;
        bt.appendChild(bf); row.appendChild(bt);
        row.appendChild(span('cali-hist-val', `${e.totalReps}`));
        hist.appendChild(row);
      });
      card.appendChild(hist);
    }
    sec.appendChild(card);
  });
  return sec;
}

// ─── Logs Tab ────────────────────────────────────────────────────────────────
function renderLog() {
  const sec = div('section');
  if (!S.log.length) {
    const empty = div('log-empty');
    empty.innerHTML = '<div style="font-size:36px;margin-bottom:12px">🏋️</div>No workouts logged yet.<br>Complete your first session to start your history.';
    sec.appendChild(empty); return sec;
  }
  sec.appendChild(span('sec-label', `${S.log.length} session${S.log.length !== 1 ? 's' : ''} logged`));

  const groups = {};
  S.log.forEach(e => {
    const month = new Date(e.date + 'T12:00:00').toLocaleDateString('en-US', {month: 'long', year: 'numeric'});
    if (!groups[month]) groups[month] = [];
    groups[month].push(e);
  });

  Object.entries(groups).forEach(([month, entries]) => {
    const mh = div(); mh.style.cssText = 'font-size:11px;font-family:var(--font-mono);color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin:0 0 10px';
    mh.textContent = month; sec.appendChild(mh);
    entries.forEach(e => {
      const card = div('log-entry');
      const top = div('log-entry-top');
      top.appendChild(span('log-lift-name', e.lift));
      const right = div('log-right');
      right.appendChild(span('log-date', fmtDateLong(e.date)));
      const del = el('button', 'del-btn'); del.textContent = '×';
      del.onclick = () => { S.log = S.log.filter(x => x.id !== e.id); ls.set('bbb_log', S.log); render() };
      right.appendChild(del); top.appendChild(right); card.appendChild(top);
      
      const tags = div('log-tags');
      const mkTag = (txt, cls) => { const t = el('span', 'tag' + (cls ? ' ' + cls : '')); t.textContent = txt; return t; };
      tags.appendChild(mkTag(`Cycle ${e.cycle}`));
      tags.appendChild(mkTag(e.weekLabel));
      tags.appendChild(mkTag(`${e.topWeight}${e.unit} × ${e.topReps}`, 'hi'));
      
      if (e.bbbWeight) {
        const liftLbl = e.bbbLift ? e.bbbLift : e.lift;
        tags.appendChild(mkTag(`BBB ${ABBR[liftLbl]} ${e.bbbWeight}${e.unit}`));
      }
      if (e.accA) tags.appendChild(mkTag(`${e.accA.name} ${e.accA.scheme} ${e.accA.weight ? '@ ' + e.accA.weight + e.unit : ''}`, 'bl'));
      if (e.accB) tags.appendChild(mkTag(`${e.accB.name} ${e.accB.scheme} ${e.accB.weight ? '@ ' + e.accB.weight + e.unit : ''}`, 'bl'));
      card.appendChild(tags); sec.appendChild(card);
    });
    sec.appendChild(div('divider'));
  });
  return sec;
}

// ─── Progress Tab ────────────────────────────────────────────────────────────
function renderProgress() {
  const sec = div('section');
  sec.appendChild(span('sec-label', 'Training Maxes & Main Lift Splits'));
  const maxTM = Math.max(...Object.values(S.tm));
  LIFTS.forEach(lift => {
    const tm = S.tm[lift];
    const count = S.log.filter(e => e.lift === lift).length;
    const d = div('prog-lift');
    const head = div('prog-lift-head');
    head.appendChild(document.createTextNode(lift));
    const pill = el('span', 'tm-pill'); pill.textContent = `${tm} ${S.unit} TM`; head.appendChild(pill);
    const sc = el('span', 'sessions-pill'); sc.textContent = `${count} session${count !== 1 ? 's' : ''}`; head.appendChild(sc);
    d.appendChild(head);
    
    [{lbl: '65%', p: .65}, {lbl: '75%', p: .75}, {lbl: '85%', p: .85}, {lbl: '90%', p: .90}, {lbl: '95%', p: .95}, {lbl: 'BBB', p: S.bbbPct}].forEach(({lbl, p}) => {
      const w = r5(p * tm), row = div('bar-row');
      const bl = div('bar-lbl'); bl.textContent = lbl; row.appendChild(bl);
      const bt = div('bar-track'); const bf = div('bar-fill');
      bf.style.width = `${Math.min(100, (w / (maxTM * .97)) * 100)}%`;
      bt.appendChild(bf); row.appendChild(bt);
      const bv = div('bar-val'); bv.textContent = w; row.appendChild(bv);
      d.appendChild(row);
    });
    sec.appendChild(d);
  });

  if (S.caliLog.length) {
    sec.appendChild(div('divider'));
    sec.appendChild(span('sec-label', 'Calisthenics Best Efforts'));
    CALI_MOVES.forEach(move => {
      const entries = S.caliLog.filter(e => e.move === move);
      if (!entries.length) return;
      const best = Math.max(...entries.map(e => e.bestSet));
      const goal = S.caliGoals[move] || 20;
      const pct = Math.min(100, Math.round((best / goal) * 100));
      const row = div('bar-row');
      const bl = div('bar-lbl'); bl.style.width = '70px'; bl.style.fontSize = '10px'; bl.textContent = move; row.appendChild(bl);
      const bt = div('bar-track'); const bf = div('bar-fill');
      bf.style.background = 'var(--green)'; bf.style.width = pct + '%';
      bt.appendChild(bf); row.appendChild(bt);
      const bv = div('bar-val'); bv.textContent = `${best}/${goal}`; bv.style.width = '50px'; row.appendChild(bv);
      sec.appendChild(row);
    });
  }
  return sec;
}

// ─── Settings Tab ────────────────────────────────────────────────────────────
function renderSettings() {
  const sec = div('section');

  sec.appendChild(span('sec-label', 'Program Cycle Metrics'));
  const l1 = div('settings-list');
  l1.appendChild(makeStepCard('Cycle', 'Increment after completing all 4 weeks', S.cycle,
    v => { S.cycle = Math.max(1, v); ls.set('bbb_cycle', S.cycle); render() }));
  l1.appendChild(makeStepCard(`Week (${WEEKS[S.weekIdx].short})`, 'Advance after completing each week', S.weekIdx + 1,
    v => { S.weekIdx = Math.max(0, Math.min(3, v - 1)); ls.set('bbb_week', S.weekIdx); render() }, 1, 4));
  sec.appendChild(l1);
  sec.appendChild(div('spacer'));

  sec.appendChild(span('sec-label', 'Modify Training Maxes (TM)'));
  const l2 = div('settings-list');
  LIFTS.forEach(lift => {
    const card = div('setting-card');
    const left = div();
    left.appendChild(span('setting-name', lift));
    left.appendChild(span('setting-hint', `Week 3 top: ${r5(.95 * S.tm[lift])} ${S.unit}`));
    card.appendChild(left);
    const inp = el('input'); inp.type = 'number'; inp.step = 5; inp.className = 'tm-input'; inp.value = S.tm[lift];
    inp.oninput = () => {
      const n = parseInt(inp.value);
      if (!isNaN(n) && n > 0) {
        S.tm[lift] = n; ls.set('bbb_tm', S.tm);
        left.children[1].textContent = `Week 3 top: ${r5(.95 * n)} ${S.unit}`;
      }
    };
    card.appendChild(inp); l2.appendChild(card);
  });
  sec.appendChild(l2);
  sec.appendChild(div('spacer'));

  sec.appendChild(span('sec-label', 'Preferred Metric'));
  const l3 = div('settings-list');
  const uc = div('setting-card'); uc.appendChild(span('setting-name', 'Weight Unit'));
  const utog = div('unit-row');
  ['lbs', 'kg'].forEach(u => {
    const b = el('button', 'unit-opt' + (S.unit === u ? ' active' : ''));
    b.textContent = u; b.onclick = () => { S.unit = u; ls.set('bbb_unit', u); render() };
    utog.appendChild(b);
  });
  uc.appendChild(utog); l3.appendChild(uc); sec.appendChild(l3);
  sec.appendChild(div('spacer'));

  // Scriptable configuration details
  sec.appendChild(span('sec-label', 'Scriptable iOS Setup'));
  const wb = div('widget-box');
  wb.appendChild(span('widget-title', 'Home Screen Setup'));
  const ws = div('widget-sub');
  ws.innerHTML = `1. Install <strong>Scriptable</strong> (App Store)<br>2. Add a new script named <strong>BBB531Widget</strong><br>3. Paste the exported code<br>4. Configure your home screen widget to run BBB531Widget`;
  wb.appendChild(ws);
  
  const expBtn = el('button', 'widget-btn');
  expBtn.textContent = 'Download Widget Script';
  expBtn.onclick = () => {
    const code = generateWidgetCode();
    const blob = new Blob([code], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'BBB531Widget.js';
    a.click();
  };
  wb.appendChild(expBtn);

  const manualSync = el('button', 'widget-btn');
  manualSync.style.marginTop = '8px';
  manualSync.textContent = 'Sync State to Widget';
  manualSync.onclick = () => { syncToWidget(); showToast('Triggering deep link...') };
  wb.appendChild(manualSync);
  sec.appendChild(wb);
  sec.appendChild(div('spacer'));

  // File Backups
  sec.appendChild(span('sec-label', 'Data Backup & Restore'));
  const l4 = div('settings-list');
  const ec = div('setting-card');
  const el2 = div(); el2.appendChild(span('setting-name', 'Export Log History')); el2.appendChild(span('setting-hint', 'Save all parameters as JSON file'));
  ec.appendChild(el2);
  const eb = el('button', 'pct-btn active'); eb.textContent = 'Export'; eb.style.cssText = 'padding:8px 16px;font-size:12px';
  eb.onclick = () => {
    const data = JSON.stringify({
      tm: S.tm, log: S.log, caliLog: S.caliLog, caliGoals: S.caliGoals,
      cycle: S.cycle, weekIdx: S.weekIdx, bbbVariant: S.bbbVariant
    }, null, 2);
    const blob = new Blob([data], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `bbb531-backup-${today()}.json`; a.click();
  };
  ec.appendChild(eb); l4.appendChild(ec);

  // Import card
  const ic = div('setting-card');
  const il = div(); il.appendChild(span('setting-name', 'Import Log History')); il.appendChild(span('setting-hint', 'Load variables back from JSON file'));
  ic.appendChild(il);
  const ib = el('button', 'pct-btn active'); ib.textContent = 'Import'; ib.style.cssText = 'padding:8px 16px;font-size:12px; border-color: var(--blue); color: var(--blue);';
  
  const fileInput = el('input'); fileInput.type = 'file'; fileInput.accept = '.json'; fileInput.style.display = 'none';
  fileInput.onchange = (evt) => {
    const file = evt.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        if (parsed.tm) { S.tm = parsed.tm; ls.set('bbb_tm', S.tm); }
        if (parsed.log) { S.log = parsed.log; ls.set('bbb_log', S.log); }
        if (parsed.caliLog) { S.caliLog = parsed.caliLog; ls.set('bbb_cali', S.caliLog); }
        if (parsed.caliGoals) { S.caliGoals = parsed.caliGoals; ls.set('bbb_cali_goals', S.caliGoals); }
        if (typeof parsed.cycle === 'number') { S.cycle = parsed.cycle; ls.set('bbb_cycle', S.cycle); }
        if (typeof parsed.weekIdx === 'number') { S.weekIdx = parsed.weekIdx; ls.set('bbb_week', S.weekIdx); }
        if (parsed.bbbVariant) { S.bbbVariant = parsed.bbbVariant; ls.set('bbb_variant', S.bbbVariant); }
        
        showToast('Restore successful');
        render();
      } catch (err) {
        showToast('Failed to parse file');
      }
    };
    reader.readAsText(file);
  };
  
  ib.onclick = () => fileInput.click();
  ic.appendChild(fileInput);
  ic.appendChild(ib);
  l4.appendChild(ic);

  sec.appendChild(l4);
  return sec;
}

function makeStepCard(name, hint, val, onChange, min = 1, max = 99) {
  const card = div('setting-card');
  const left = div(); left.appendChild(span('setting-name', name)); left.appendChild(span('setting-hint', hint));
  card.appendChild(left);
  const stepper = div('stepper');
  const minus = el('button', 'step-btn'); minus.textContent = '−'; minus.onclick = () => onChange(val - 1 < min ? min : val - 1);
  const numEl = div('stepper-val'); numEl.textContent = val;
  const plus = el('button', 'step-btn'); plus.textContent = '+'; plus.onclick = () => onChange(val + 1 > max ? max : val + 1);
  stepper.append(minus, numEl, plus); card.appendChild(stepper);
  return card;
}
